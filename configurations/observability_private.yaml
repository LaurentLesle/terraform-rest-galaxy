# ── Azure Observability — Private Stack (AMPLS) ───────────────────────────────
# Phase 2: all traffic routed through Azure Monitor Private Link Scope.
# All monitoring services are locked to PrivateOnly access mode.
# Grafana is deployed with publicNetworkAccess: Disabled and connected
# to the VNet via a private endpoint.
# subscription_id: 00000000-0000-0000-0000-000000000000

terraform_backend:
  type: local
  path: observability_private.tfstate

default_location: westeurope

# ── Resource Group ─────────────────────────────────────────────────────────────

azure_resource_groups:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: rg-observability-private
    location: westeurope
    tags:
      environment: dev
      scenario: observability-private

# ── Virtual Network ────────────────────────────────────────────────────────────

azure_virtual_networks:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    virtual_network_name: vnet-observability-private
    location: ref:azure_resource_groups.obs-private.location
    address_space:
      - 10.0.0.0/16
    subnets:
      - name: snet-private-endpoints
        address_prefix: 10.0.1.0/24
        private_endpoint_network_policies: Disabled
    tags: ref:azure_resource_groups.obs-private.tags

# ── User Assigned Identity ─────────────────────────────────────────────────────

azure_user_assigned_identities:
  grafana:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    identity_name: id-grafana-private
    location: ref:azure_resource_groups.obs-private.location
    tags: ref:azure_resource_groups.obs-private.tags

# ── Azure Monitor Workspace ────────────────────────────────────────────────────

azure_monitor_workspaces:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    monitor_workspace_name: amw-observability-private
    location: ref:azure_resource_groups.obs-private.location
    tags: ref:azure_resource_groups.obs-private.tags

# ── Log Analytics Workspace ────────────────────────────────────────────────────

azure_log_analytics_workspaces:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    workspace_name: law-observability-private
    location: ref:azure_resource_groups.obs-private.location
    sku_name: PerGB2018
    retention_in_days: 30
    features_disable_local_auth: true
    tags: ref:azure_resource_groups.obs-private.tags

# ── Managed Grafana ────────────────────────────────────────────────────────────

azure_managed_grafanas:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    grafana_name: grafana-observability-private
    location: ref:azure_resource_groups.obs-private.location
    sku_name: Standard
    identity_type: UserAssigned
    identity_user_assigned_identity_ids:
      - ref:azure_user_assigned_identities.grafana.id
    public_network_access: Disabled
    zone_redundancy: Disabled
    azure_monitor_workspace_integrations:
      - azure_monitor_workspace_resource_id: ref:azure_monitor_workspaces.obs-private.id
    tags: ref:azure_resource_groups.obs-private.tags

# ── Data Collection Endpoint ───────────────────────────────────────────────────

azure_data_collection_endpoints:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    data_collection_endpoint_name: dce-observability-private
    location: ref:azure_resource_groups.obs-private.location
    public_network_access: Disabled
    tags: ref:azure_resource_groups.obs-private.tags

# ── Data Collection Rule ───────────────────────────────────────────────────────

azure_data_collection_rules:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    data_collection_rule_name: dcr-observability-private
    location: ref:azure_resource_groups.obs-private.location
    description: Private observability data collection rule routing to Log Analytics and Azure Monitor Workspace via private link
    data_collection_endpoint_id: ref:azure_data_collection_endpoints.obs-private.id
    destinations:
      logAnalytics:
        - workspaceResourceId: ref:azure_log_analytics_workspaces.obs-private.id
          name: law-destination
      azureMonitorMetrics:
        name: amw-destination
    data_flows:
      - streams:
          - Microsoft-Perf
          - Microsoft-Syslog
        destinations:
          - law-destination
      - streams:
          - Microsoft-InsightsMetrics
        destinations:
          - amw-destination
    data_sources:
      performanceCounters:
        - name: perf-private
          streams:
            - Microsoft-Perf
          samplingFrequencyInSeconds: 60
          counterSpecifiers:
            - "\\Processor Information(_Total)\\% Processor Time"
            - "\\Memory\\Available Bytes"
    tags: ref:azure_resource_groups.obs-private.tags

# ── Azure Monitor Private Link Scope ──────────────────────────────────────────

azure_monitor_private_link_scopes:
  obs-private:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    scope_name: ampls-observability-private
    location: ref:azure_resource_groups.obs-private.location
    ingestion_access_mode: PrivateOnly
    query_access_mode: PrivateOnly
    tags: ref:azure_resource_groups.obs-private.tags

# ── AMPLS Scoped Resources ─────────────────────────────────────────────────────
# Link the Azure Monitor Workspace and Data Collection Endpoint into the scope.

azure_monitor_private_link_scoped_resources:
  ampls-amw:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_link_scope_name: ref:azure_monitor_private_link_scopes.obs-private.name
    scoped_resource_name: ampls-link-amw
    linked_resource_id: ref:azure_monitor_workspaces.obs-private.id
  ampls-dce:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_link_scope_name: ref:azure_monitor_private_link_scopes.obs-private.name
    scoped_resource_name: ampls-link-dce
    linked_resource_id: ref:azure_data_collection_endpoints.obs-private.id

# ── Private DNS Zones ──────────────────────────────────────────────────────────
# Required zones for AMPLS private endpoints.

azure_private_dns_zones:
  monitor:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    zone_name: privatelink.monitor.azure.com
    tags: ref:azure_resource_groups.obs-private.tags
  ods:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    zone_name: privatelink.ods.opinsights.azure.com
    tags: ref:azure_resource_groups.obs-private.tags
  oms:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    zone_name: privatelink.oms.opinsights.azure.com
    tags: ref:azure_resource_groups.obs-private.tags
  blob:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    zone_name: privatelink.blob.core.windows.net
    tags: ref:azure_resource_groups.obs-private.tags
  agentsvc:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    zone_name: privatelink.agentsvc.azure-automation.net
    tags: ref:azure_resource_groups.obs-private.tags
  grafana:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    zone_name: privatelink.grafana.azure.com
    tags: ref:azure_resource_groups.obs-private.tags

# ── Private DNS Zone Virtual Network Links ─────────────────────────────────────
# One link per DNS zone → obs-private VNet for private name resolution.

azure_private_dns_zone_virtual_network_links:
  monitor-link:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_dns_zone_name: ref:azure_private_dns_zones.monitor.name
    virtual_network_link_name: link-vnet-to-monitor-dns
    virtual_network_id: ref:azure_virtual_networks.obs-private.id
    registration_enabled: false
    tags: ref:azure_resource_groups.obs-private.tags
  ods-link:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_dns_zone_name: ref:azure_private_dns_zones.ods.name
    virtual_network_link_name: link-vnet-to-ods-dns
    virtual_network_id: ref:azure_virtual_networks.obs-private.id
    registration_enabled: false
    tags: ref:azure_resource_groups.obs-private.tags
  oms-link:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_dns_zone_name: ref:azure_private_dns_zones.oms.name
    virtual_network_link_name: link-vnet-to-oms-dns
    virtual_network_id: ref:azure_virtual_networks.obs-private.id
    registration_enabled: false
    tags: ref:azure_resource_groups.obs-private.tags
  blob-link:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_dns_zone_name: ref:azure_private_dns_zones.blob.name
    virtual_network_link_name: link-vnet-to-blob-dns
    virtual_network_id: ref:azure_virtual_networks.obs-private.id
    registration_enabled: false
    tags: ref:azure_resource_groups.obs-private.tags
  agentsvc-link:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_dns_zone_name: ref:azure_private_dns_zones.agentsvc.name
    virtual_network_link_name: link-vnet-to-agentsvc-dns
    virtual_network_id: ref:azure_virtual_networks.obs-private.id
    registration_enabled: false
    tags: ref:azure_resource_groups.obs-private.tags
  grafana-link:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_dns_zone_name: ref:azure_private_dns_zones.grafana.name
    virtual_network_link_name: link-vnet-to-grafana-dns
    virtual_network_id: ref:azure_virtual_networks.obs-private.id
    registration_enabled: false
    tags: ref:azure_resource_groups.obs-private.tags

# ── Private Endpoints ─────────────────────────────────────────────────────────

azure_private_endpoints:
  ampls:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_endpoint_name: pe-ampls-observability-private
    location: ref:azure_resource_groups.obs-private.location
    subnet_id: ref:azure_virtual_networks.obs-private.subnet_ids.snet-private-endpoints
    private_service_connection_name: psc-ampls
    private_connection_resource_id: ref:azure_monitor_private_link_scopes.obs-private.id
    subresource_names:
      - azuremonitor
    is_manual_connection: false
    tags: ref:azure_resource_groups.obs-private.tags
  grafana:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-private.resource_group_name
    private_endpoint_name: pe-grafana-observability-private
    location: ref:azure_resource_groups.obs-private.location
    subnet_id: ref:azure_virtual_networks.obs-private.subnet_ids.snet-private-endpoints
    private_service_connection_name: psc-grafana
    private_connection_resource_id: ref:azure_managed_grafanas.obs-private.id
    subresource_names:
      - grafana
    is_manual_connection: false
    tags: ref:azure_resource_groups.obs-private.tags

# ── Role Assignments ──────────────────────────────────────────────────────────

azure_role_assignments:
  grafana-amw-reader:
    scope: ref:azure_monitor_workspaces.obs-private.id
    principal_id: ref:azure_user_assigned_identities.grafana.principal_id
    # Monitoring Data Reader (built-in)
    role_definition_id: /providers/Microsoft.Authorization/roleDefinitions/b0d8363b-8ddd-447d-831f-62ca05bff136
  grafana-law-reader:
    scope: ref:azure_log_analytics_workspaces.obs-private.id
    principal_id: ref:azure_user_assigned_identities.grafana.principal_id
    # Log Analytics Reader (built-in)
    role_definition_id: /providers/Microsoft.Authorization/roleDefinitions/73c42c96-874c-492b-b04d-ab87d138a893
