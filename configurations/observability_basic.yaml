default_location: westeurope

terraform_backend:
  type: local
  path: observability_basic.tfstate

azure_resource_groups:
  obs-basic:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: rg-observability-basic
    location: westeurope
    tags:
      environment: dev
      scenario: observability-basic

azure_monitor_workspaces:
  obs-basic:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-basic.resource_group_name
    monitor_workspace_name: amw-observability-basic
    location: ref:azure_resource_groups.obs-basic.location
    tags: ref:azure_resource_groups.obs-basic.tags

azure_log_analytics_workspaces:
  obs-basic:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-basic.resource_group_name
    workspace_name: law-observability-basic
    location: ref:azure_resource_groups.obs-basic.location
    sku_name: PerGB2018
    retention_in_days: 30
    features_disable_local_auth: true
    tags: ref:azure_resource_groups.obs-basic.tags

azure_data_collection_endpoints:
  obs-basic:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-basic.resource_group_name
    data_collection_endpoint_name: dce-observability-basic
    location: ref:azure_resource_groups.obs-basic.location
    public_network_access: Enabled
    tags: ref:azure_resource_groups.obs-basic.tags

azure_data_collection_rules:
  obs-basic:
    subscription_id: "00000000-0000-0000-0000-000000000000"
    resource_group_name: ref:azure_resource_groups.obs-basic.resource_group_name
    data_collection_rule_name: dcr-observability-basic
    location: ref:azure_resource_groups.obs-basic.location
    description: Basic observability data collection rule routing to Log Analytics and Azure Monitor Workspace
    data_collection_endpoint_id: ref:azure_data_collection_endpoints.obs-basic.id
    destinations:
      logAnalytics:
        - workspaceResourceId: ref:azure_log_analytics_workspaces.obs-basic.id
          name: law-destination
      azureMonitorMetrics:
        name: amw-destination
    data_flows:
      - streams:
          - Microsoft-Perf
          - Microsoft-Syslog
        destinations:
          - law-destination
      - streams:
          - Microsoft-InsightsMetrics
        destinations:
          - amw-destination
    data_sources:
      performanceCounters:
        - name: perf-basic
          streams:
            - Microsoft-Perf
          samplingFrequencyInSeconds: 60
          counterSpecifiers:
            - "\\Processor Information(_Total)\\% Processor Time"
            - "\\Memory\\Available Bytes"
    tags: ref:azure_resource_groups.obs-basic.tags
