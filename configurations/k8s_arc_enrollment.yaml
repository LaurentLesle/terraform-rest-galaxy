# ── External role definitions (resolved at plan time via ARM API) ────────────

externals:
  azure_role_definitions:
    arc_cluster_admin:
      role_name: "Azure Arc Kubernetes Cluster Admin"
    arc_cluster_viewer:
      role_name: "Azure Arc Kubernetes Viewer"

# ── Entra ID RBAC on Arc-connected clusters ─────────────────────────────────

azure_role_assignments:
  arc_platform_admin:
    scope: ref:azure_arc_connected_clusters.platform.id
    role_definition_id: ref:externals.azure_role_definitions.arc_cluster_admin.id
    principal_id: ref:entraid_groups.k8s_platform_admins.id
    principal_type: Group

  arc_platform_reader:
    scope: ref:azure_arc_connected_clusters.platform.id
    role_definition_id: ref:externals.azure_role_definitions.arc_cluster_viewer.id
    principal_id: ref:entraid_groups.k8s_platform_readers.id
    principal_type: Group

  arc_edge_operator:
    scope: ref:azure_arc_connected_clusters.edge.id
    role_definition_id: ref:externals.azure_role_definitions.arc_cluster_admin.id
    principal_id: ref:entraid_groups.k8s_edge_operators.id
    principal_type: Group

  arc_edge_viewer:
    scope: ref:azure_arc_connected_clusters.edge.id
    role_definition_id: ref:externals.azure_role_definitions.arc_cluster_viewer.id
    principal_id: ref:entraid_groups.k8s_edge_viewers.id
    principal_type: Group
