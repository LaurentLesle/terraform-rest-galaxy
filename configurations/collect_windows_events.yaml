# ── Windows Event Log Collection ────────────────────────────────────────────────
# Windows Event Log collection using XPath queries filtered by severity.
# Channels: Application (errors), System (errors+warnings), Security (audit failures),
# AppLocker (blocked execution). Destination: Log Analytics Workspace.

terraform_backend:
  type: local
  path: collect_windows_events.tfstate

default_location: westeurope

azure_resource_groups:
  winevt:
    resource_group_name: rg-collect-windows-events
    location: westeurope
    tags:
      environment: production
      scenario: windows-event-collection

azure_log_analytics_workspaces:
  winevt:
    resource_group_name: ref:azure_resource_groups.winevt.resource_group_name
    workspace_name: law-collect-winevt
    location: ref:azure_resource_groups.winevt.location
    sku_name: PerGB2018
    retention_in_days: 90
    features_disable_local_auth: true
    tags: ref:azure_resource_groups.winevt.tags

azure_data_collection_endpoints:
  winevt:
    resource_group_name: ref:azure_resource_groups.winevt.resource_group_name
    data_collection_endpoint_name: dce-collect-winevt
    location: ref:azure_resource_groups.winevt.location
    public_network_access: Enabled
    tags: ref:azure_resource_groups.winevt.tags

azure_data_collection_rules:
  winevt:
    resource_group_name: ref:azure_resource_groups.winevt.resource_group_name
    data_collection_rule_name: dcr-collect-windows-events
    location: ref:azure_resource_groups.winevt.location
    kind: Windows
    description: Windows Event Log collection with XPath severity filters to Log Analytics
    data_collection_endpoint_id: ref:azure_data_collection_endpoints.winevt.id
    destinations:
      logAnalytics:
        - workspaceResourceId: ref:azure_log_analytics_workspaces.winevt.id
          name: law-destination
    data_flows:
      - streams:
          - Microsoft-WindowsEvent
        destinations:
          - law-destination
    data_sources:
      windowsEventLogs:
        # Application channel: Error (Level=2) and Critical (Level=1) events
        - name: winevt-application-errors
          streams:
            - Microsoft-WindowsEvent
          xPathQueries:
            - "Application!*[System[(Level=1 or Level=2)]]"
        # System channel: Error (2), Critical (1), and Warning (3) events
        - name: winevt-system-errors
          streams:
            - Microsoft-WindowsEvent
          xPathQueries:
            - "System!*[System[(Level=1 or Level=2 or Level=3)]]"
        # Security channel: Audit Failure events for failed logons (4625) and explicit credentials (4648)
        - name: winevt-security-audit
          streams:
            - Microsoft-WindowsEvent
          xPathQueries:
            - "Security!*[System[(EventID=4625 or EventID=4648) and band(Keywords,4503599627370496)]]"
        # AppLocker: blocked EXE/DLL execution events (8004 = blocked)
        - name: winevt-applocker-blocked
          streams:
            - Microsoft-WindowsEvent
          xPathQueries:
            - "Microsoft-Windows-AppLocker/EXE and DLL!*[System[(EventID=8004)]]"
    tags: ref:azure_resource_groups.winevt.tags
