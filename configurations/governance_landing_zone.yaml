  root_k8s_approved_host_network_ports:
    scope: ref:azure_management_groups.mg_root.id
    policy_definition_id: ref:externals.policy_definitions.k8s_approved_host_network_ports.id
    display_name: "Kubernetes — approved host network and port range only (root)"
