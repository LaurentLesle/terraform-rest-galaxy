# ── Landing Zone Governance ─────────────────────────────────────────────────
# ci:requires-live-token
# (externals.entraid_groups and externals.azure_role_definitions require live
#  ARM/Graph API calls at plan time to resolve group object IDs and role IDs)
#
# Demonstrates the full governance stack:
#   - Management group hierarchy (ALZ reference architecture)
#   - RBAC at management group scope — Entra groups wired via ref:externals
#   - Custom policy definitions at management group scope
#   - Custom initiative combining custom + built-in policies
#   - Policy assignments mixing custom and built-in (via externals) definitions
#
# Authentication:
#   export TF_VAR_access_token=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
#   export TF_VAR_subscription_id=$(az account show --query id -o tsv)
#   ./tf.sh apply configurations/governance_landing_zone.yaml
#
# Notes:
#   - Built-in policy/initiative IDs are under externals.policy_definitions / policy_set_definitions.
#   - Built-in role definition names are under externals.azure_role_definitions (resolved at plan time).
#   - Entra group object IDs are under externals.entraid_groups — replace placeholders with real GUIDs.
#   - No ARM IDs or GUIDs are hardcoded in resource blocks — all cross-references use ref:.
# ─────────────────────────────────────────────────────────────────────────────

default_location: westeurope

# ── External references (built-in policies and initiatives, not managed here) ─
# Declare well-known built-in policies/initiatives so they can be referenced
# via ref:externals.policy_definitions.<key>.id and
# ref:externals.policy_set_definitions.<key>.id in any resource below.
externals:
  # ── Platform subscription IDs (replace with real GUIDs before deploying) ─────
  # Reference with: ref:externals.azure_subscriptions.<key>.id
  azure_subscriptions:
    platform_management:
      id: "00000000-0000-0000-0000-000000000001"
      # Replace with the actual Platform Management subscription GUID.
      # Obtain it with: az account list --query "[?name=='Platform Management'].id" -o tsv

  # ── Built-in role definitions (static ARM paths — GUIDs are globally stable) ─
  # Reference with: ref:externals.azure_role_definitions.<key>.id
