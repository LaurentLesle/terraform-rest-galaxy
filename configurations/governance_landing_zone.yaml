    policy_definition_id: ref:externals.policy_definitions.k8s_no_host_namespace_sharing.id
    display_name: "Kubernetes — no shared host namespaces (PID/IPC/Network) (root)"
    enforcement_mode: Default
    non_compliance_messages:
      - message: "Kubernetes containers must not share host PID, IPC, or network namespaces."

