# ── Management Group Hierarchy ────────────────────────────────────────────────
# parent_id uses explicit ARM paths — management groups resolve at L0 and cannot
# self-reference via ref: at that layer. The ARM path is deterministic and known
# without an API call: /providers/Microsoft.Management/managementGroups/{id}.
# Use externals.azure_management_groups to reference pre-existing groups.
azure_management_groups:
  mg_root:
    display_name: "Contoso Root"
    # parent_id omitted — placed under tenant root group

  mg_platform:
    display_name: "Platform"
    parent_id: /providers/Microsoft.Management/managementGroups/mg_root

  mg_platform_management:
    display_name: "Management"
    parent_id: /providers/Microsoft.Management/managementGroups/mg_platform

  mg_platform_connectivity:
    display_name: "Connectivity"
    parent_id: /providers/Microsoft.Management/managementGroups/mg_platform

  mg_platform_identity:
