      owner:        platform-team

# ── Custom Policy Definitions ─────────────────────────────────────────────────
# Defined at the root management group scope — visible to all child groups.
azure_policy_definitions:
  deny_unapproved_regions:
    scope: ref:azure_management_groups.mg_root.id
    display_name: "Deny resources outside approved regions"
    mode: Indexed
    metadata:
      category: "Location"
      version: "1.0.0"
    parameters:
      allowedLocations:
        type: Array
        metadata:
          displayName: "Allowed locations"
          description: "List of Azure regions where resources are permitted."
        defaultValue: ["westeurope", "northeurope"]
    policy_rule:
      if:
        not:
          field: "location"
          in: "[parameters('allowedLocations')]"
      then:
        effect: Deny

  require_environment_tag:
    scope: ref:azure_management_groups.mg_root.id
    display_name: "Require 'environment' tag on all resources"
    mode: Indexed
    metadata:
      category: "Tags"
      version: "1.0.0"
    policy_rule:
      if:
        field: "tags['environment']"
        exists: "false"
      then:
        effect: Deny

  require_owner_tag:
    scope: ref:azure_management_groups.mg_root.id
    display_name: "Require 'owner' tag on all resources"
    mode: Indexed
    metadata:
      category: "Tags"
      version: "1.0.0"
    policy_rule:
      if:
        field: "tags['owner']"
        exists: "false"
      then:
        effect: Deny

  deny_public_subnets:
    scope: ref:azure_management_groups.mg_landing_zones.id
    display_name: "Deny subnets without NSG in landing zones"
    mode: All
    metadata:
      category: "Network"
      version: "1.0.0"
    policy_rule:
      if:
        allOf:
          - field: "type"
            equals: "Microsoft.Network/virtualNetworks/subnets"
          - field: "Microsoft.Network/virtualNetworks/subnets/networkSecurityGroup.id"
            exists: "false"
          - not:
              field: "name"
              in: ["GatewaySubnet", "AzureFirewallSubnet", "AzureBastionSubnet", "RouteServerSubnet"]
      then:
        effect: Deny

# ── Custom Initiatives (Policy Set Definitions) ───────────────────────────────
azure_policy_set_definitions:
  lz_tagging_baseline:
    scope: ref:azure_management_groups.mg_root.id
    display_name: "Landing Zone Tagging Baseline"
    metadata:
      category: "Tags"
      version: "1.0.0"
    description: "Enforces mandatory tagging standards across all landing zone resources."
    policy_definition_groups:
      - name: "mandatory-tags"
        display_name: "Mandatory Tags"
    policy_definitions:
      - policy_definition_id: ref:azure_policy_definitions.require_environment_tag.id
        policy_definition_reference_id: require_environment_tag
        group_names: ["mandatory-tags"]
      - policy_definition_id: ref:azure_policy_definitions.require_owner_tag.id
        policy_definition_reference_id: require_owner_tag
        group_names: ["mandatory-tags"]
      - policy_definition_id: ref:externals.policy_definitions.require_tags.id
        policy_definition_reference_id: require_cost_center_tag
        group_names: ["mandatory-tags"]
        parameters:
          tagName: { value: "cost-center" }

  lz_network_baseline:
    scope: ref:azure_management_groups.mg_landing_zones.id
    display_name: "Landing Zone Network Security Baseline"
    metadata:
      category: "Network"
      version: "1.0.0"
    description: "Network security guardrails for all landing zone subscriptions."
    policy_definitions:
      - policy_definition_id: ref:azure_policy_definitions.deny_public_subnets.id
        policy_definition_reference_id: deny_public_subnets
      - policy_definition_id: ref:externals.policy_definitions.deny_public_ip.id
        policy_definition_reference_id: deny_public_ip_builtin

