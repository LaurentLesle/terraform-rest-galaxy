# ── Role Assignments at management group scope ────────────────────────────────
# All scopes use ref:azure_management_groups.<key>.id (plan-time known).
# All principal_id values use ref:entraid_groups.<key>.id.
# All role_definition_id values use ref:externals.azure_role_definitions.<key>.id.
# No GUIDs are hardcoded in this section.
azure_role_assignments:

  # ── Root MG: Security Ops → Security Reader ────────────────────────────────
  root_security_ops_reader:
    scope:              ref:azure_management_groups.mg_root.id
    role_definition_id: ref:externals.azure_role_definitions.security_reader.id
    principal_id:       ref:entraid_groups.grp_security_ops.id
    principal_type:     Group
    description:        "ALZ Security Operations — Security Reader at tenant root scope"

  # Root MG: Security Ops → Security Admin (for alert/remediation tasks)
  root_security_ops_admin:
    scope:              ref:azure_management_groups.mg_root.id
    role_definition_id: ref:externals.azure_role_definitions.security_admin.id
    principal_id:       ref:entraid_groups.grp_security_ops.id
    principal_type:     Group
    description:        "ALZ Security Operations — Security Admin at tenant root scope"

  # Root MG: Global Readers → Reader
  root_global_readers:
    scope:              ref:azure_management_groups.mg_root.id
    role_definition_id: ref:externals.azure_role_definitions.reader.id
    principal_id:       ref:entraid_groups.grp_global_readers.id
    principal_type:     Group
    description:        "ALZ Global Readers — read-only access to all MGs"

  # Root MG: Cost Management → Cost Management Reader
  root_cost_management:
    scope:              ref:azure_management_groups.mg_root.id
    role_definition_id: ref:externals.azure_role_definitions.cost_management_reader.id
    principal_id:       ref:entraid_groups.grp_cost_management.id
    principal_type:     Group
    description:        "ALZ FinOps — Cost Management Reader at tenant root scope"

  # ── Platform MG: Platform Owners → Owner ──────────────────────────────────
  platform_owners:
    scope:              ref:azure_management_groups.mg_platform.id
    role_definition_id: ref:externals.azure_role_definitions.owner.id
    principal_id:       ref:entraid_groups.grp_platform_owners.id
    principal_type:     Group
    description:        "ALZ Platform Owners — Owner on Platform MG"

  # Platform MG: Security Ops → Management Group Contributor (for policy/lock mgmt)
  platform_security_mg_contributor:
    scope:              ref:azure_management_groups.mg_platform.id
    role_definition_id: ref:externals.azure_role_definitions.management_group_contributor.id
    principal_id:       ref:entraid_groups.grp_security_ops.id
    principal_type:     Group
    description:        "ALZ Security Operations — Management Group Contributor on Platform"

  # ── Platform / Management MG ──────────────────────────────────────────────
  platform_management_admins:
    scope:              ref:azure_management_groups.mg_platform_management.id
    role_definition_id: ref:externals.azure_role_definitions.contributor.id
    principal_id:       ref:entraid_groups.grp_management_admins.id
    principal_type:     Group
    description:        "ALZ Management Admins — Contributor on Management MG"

  # ── Platform / Connectivity MG ────────────────────────────────────────────
  platform_connectivity_network_admins:
    scope:              ref:azure_management_groups.mg_platform_connectivity.id
    role_definition_id: ref:externals.azure_role_definitions.network_contributor.id
    principal_id:       ref:entraid_groups.grp_connectivity_admins.id
    principal_type:     Group
    description:        "ALZ Connectivity Admins — Network Contributor on Connectivity MG"

  platform_connectivity_owners:
    scope:              ref:azure_management_groups.mg_platform_connectivity.id
    role_definition_id: ref:externals.azure_role_definitions.owner.id
    principal_id:       ref:entraid_groups.grp_platform_owners.id
    principal_type:     Group
    description:        "ALZ Platform Owners — Owner on Connectivity MG (for hub-and-spoke management)"

  # ── Platform / Identity MG ────────────────────────────────────────────────
  platform_identity_admins:
    scope:              ref:azure_management_groups.mg_platform_identity.id
    role_definition_id: ref:externals.azure_role_definitions.contributor.id
    principal_id:       ref:entraid_groups.grp_identity_admins.id
    principal_type:     Group
    description:        "ALZ Identity Admins — Contributor on Identity MG"

  # ── Landing Zones MG ──────────────────────────────────────────────────────
  lz_owners_contributor:
    scope:              ref:azure_management_groups.mg_landing_zones.id
    role_definition_id: ref:externals.azure_role_definitions.contributor.id
    principal_id:       ref:entraid_groups.grp_lz_owners.id
    principal_type:     Group
    description:        "ALZ Landing Zone Owners — Contributor at Landing Zones MG"

  lz_security_reader:
    scope:              ref:azure_management_groups.mg_landing_zones.id
    role_definition_id: ref:externals.azure_role_definitions.security_reader.id
    principal_id:       ref:entraid_groups.grp_security_ops.id
    principal_type:     Group
    description:        "ALZ Security Operations — Security Reader at Landing Zones MG"

  lz_mg_contributor:
    scope:              ref:azure_management_groups.mg_landing_zones.id
    role_definition_id: ref:externals.azure_role_definitions.management_group_contributor.id
    principal_id:       ref:entraid_groups.grp_lz_owners.id
    principal_type:     Group
    description:        "ALZ Landing Zone Owners — Management Group Contributor (for adding subscriptions)"

