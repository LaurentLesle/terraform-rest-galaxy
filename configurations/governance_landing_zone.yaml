    scope: ref:azure_management_groups.mg_root.id
    policy_definition_id: ref:externals.policy_definitions.k8s_allowed_images.id
    display_name: "Kubernetes — only allowed container images (root)"
    # DoNotEnforce until allowedContainerImagesRegex is set to match your registries.
    # Example: "^<acr_name>\\.azurecr\\.io/.+" for Azure Container Registry
    enforcement_mode: DoNotEnforce
    parameters:
      allowedContainerImagesRegex:
        value: "^.+\\.azurecr\\.io/.+"
    non_compliance_messages:
      - message: "Kubernetes containers must only use images from approved Azure Container Registries."

  root_k8s_allowed_apparmor_profiles:
    scope: ref:azure_management_groups.mg_root.id
    policy_definition_id: ref:externals.policy_definitions.k8s_allowed_apparmor_profiles.id
    display_name: "Kubernetes — allowed AppArmor profiles only (root)"
    enforcement_mode: Default
    parameters:
      allowedProfiles:
        value: ["runtime/default", "localhost/*"]

