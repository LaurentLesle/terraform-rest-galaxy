# ── Acme Network Architecture ────────────────────────────────────────────────
# Azure DataCenters - Acme provisioned and managed
#
# This configuration maps the architecture diagram to Terraform resources.
# Use: TF_VAR_config_file=config.yaml terraform plan
#
# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ RESOURCES IDENTIFIED FROM DIAGRAM                                           │
# │                                                                             │
# │ ✅ Deployable with existing modules:                                        │
# │   - 2 Resource Groups (US West, Israel Central)                             │
# │   - 1 Virtual WAN (Microsoft Global Network Backbone)                       │
# │   - 4 Virtual Hubs (2x US West, 2x Israel Central) with Route Servers      │
# │   - 3 Virtual Networks (Israel Central)                                     │
# │   - 1 Virtual Network Gateway (ER GW 20 Gbps, Israel Central)              │
# │   - 1 Express Route Circuit (Local, Unlimited Data, Israel Central)         │
# │   - 1 VNet Gateway Connection (ExpressRoute, FastPath enabled)              │
# │   - 1 Storage Account (Staging, Israel Central)                             │
# │   - 3 Private Endpoints (one per Israel Central VNet)                       │
# │   - VPN Gateways (vWAN S2S) - 2x 40 Units in Hub 1 & Hub 2                │
# │   - Express Route Ports - 2x 100 Gbps links                                │
# │   - Virtual Hub VNet Connections - 2x (Hub3→VNet, Hub4→VNet)               │
# │   - ExpressRoute Circuit Peering (Azure Private Peering 100 Gbps)          │
# └──────────────────────────────────────────────────────────────────────────────┘

# ==============================================================================
# Resource Groups
# ==============================================================================
azure_resource_groups:
  networking-uswest:
    resource_group_name: rg-acme-networking-uswest
    location: westus
    tags:
      environment: production
      managed_by: acme
      purpose: networking

  networking-israelcentral:
    resource_group_name: rg-acme-networking-israelcentral
    location: israelcentral
    tags:
      environment: production
      managed_by: acme
      purpose: networking

# ==============================================================================
# Virtual WAN  (Microsoft Global Network Backbone)
# ==============================================================================
azure_virtual_wans:
  acme:
    resource_group_name: ref:azure_resource_groups.networking-uswest.resource_group_name
    virtual_wan_name: vwan-acme
    location: ref:azure_resource_groups.networking-uswest.location
    type: Standard
    allow_branch_to_branch_traffic: true
    tags:
      environment: production
      managed_by: acme

# ==============================================================================
# Virtual Hubs  (4 hubs: 2x US West, 2x Israel Central)
# Hub implicit peering is automatic via Virtual WAN backbone.
# Route Server 20 Units = virtual_router_auto_scale_min_capacity: 20
# ==============================================================================
azure_virtual_hubs:
  # ── Virtual Hub 1 (US West) ──
  # Contains: S2S VPN GW (40 Units) + Route Server 20 Units
  hub1-uswest:
    resource_group_name: ref:azure_resource_groups.networking-uswest.resource_group_name
    virtual_hub_name: vhub-acme-uswest-01
    location: westus
    virtual_wan_id: ref:azure_virtual_wans.acme.id
    address_prefix: "10.1.0.0/24"
    sku: Standard
    virtual_router_auto_scale_min_capacity: 20
    tags:
      environment: production
      managed_by: acme

  # ── Virtual Hub 2 (US West) ──
  # Contains: S2S VPN GW (40 Units) + Route Server 20 Units
  hub2-uswest:
    resource_group_name: ref:azure_resource_groups.networking-uswest.resource_group_name
    virtual_hub_name: vhub-acme-uswest-02
    location: westus
    virtual_wan_id: ref:azure_virtual_wans.acme.id
    address_prefix: "10.2.0.0/24"
    sku: Standard
    virtual_router_auto_scale_min_capacity: 20
    tags:
      environment: production
      managed_by: acme

  # ── Virtual Hub 3 (Israel Central) - top ──
  # Route Server 20 Units. Connected to VNet via vhub peering (top).
  hub3-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    virtual_hub_name: vhub-acme-israelcentral-01
    location: israelcentral
    virtual_wan_id: ref:azure_virtual_wans.acme.id
    address_prefix: "10.3.0.0/24"
    sku: Standard
    virtual_router_auto_scale_min_capacity: 20
    tags:
      environment: production
      managed_by: acme

  # ── Virtual Hub 4 (Israel Central) - bottom ──
  # Route Server 20 Units. Connected to VNet via vhub peering (bottom).
  hub4-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    virtual_hub_name: vhub-acme-israelcentral-02
    location: israelcentral
    virtual_wan_id: ref:azure_virtual_wans.acme.id
    address_prefix: "10.4.0.0/24"
    sku: Standard
    virtual_router_auto_scale_min_capacity: 20
    tags:
      environment: production
      managed_by: acme

# ==============================================================================
# Virtual Networks  (3x Israel Central)
# ==============================================================================
azure_virtual_networks:
  # ── VNet connected to Hub 3 (top) via vhub peering ──
  # Contains: Private endpoint
  vnet-pe1-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    virtual_network_name: vnet-acme-pe1-israelcentral
    location: israelcentral
    address_space:
      - "10.10.0.0/16"
    subnets:
      - name: snet-private-endpoints
        address_prefix: "10.10.1.0/24"
        private_endpoint_network_policies: Disabled
    tags:
      environment: production
      managed_by: acme

  # ── VNet with ER Gateway ──
  # Contains: ER GW 20 Gbps + Private endpoint
  # Connected to ExpressRoute via FastPath
  vnet-ergw-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    virtual_network_name: vnet-acme-ergw-israelcentral
    location: israelcentral
    address_space:
      - "10.11.0.0/16"
    subnets:
      - name: GatewaySubnet
        address_prefix: "10.11.0.0/24"
      - name: snet-private-endpoints
        address_prefix: "10.11.1.0/24"
        private_endpoint_network_policies: Disabled
    tags:
      environment: production
      managed_by: acme

  # ── VNet connected to Hub 4 (bottom) via vhub peering ──
  # Contains: Private endpoint
  vnet-pe2-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    virtual_network_name: vnet-acme-pe2-israelcentral
    location: israelcentral
    address_space:
      - "10.12.0.0/16"
    subnets:
      - name: snet-private-endpoints
        address_prefix: "10.12.1.0/24"
        private_endpoint_network_policies: Disabled
    tags:
      environment: production
      managed_by: acme

# ==============================================================================
# Express Route Circuit  (Local - Unlimited Data - Israel Central)
# Uses ExpressRoute Port (100 Gbps)
# ==============================================================================
azure_express_route_circuits:
  erc-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    circuit_name: erc-acme-israelcentral
    location: israelcentral
    sku_tier: Local
    sku_family: UnlimitedData
    bandwidth_in_gbps: 100
    # express_route_port_id: "<REQUIRES express_route_port module - see missing resources>"
    tags:
      environment: production
      managed_by: acme

# ==============================================================================
# Virtual Network Gateway  (ER GW 20 Gbps - ExpressRoute Gateway)
# ==============================================================================
azure_virtual_network_gateways:
  ergw-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    gateway_name: ergw-acme-israelcentral
    location: israelcentral
    gateway_type: ExpressRoute
    sku_name: ErGwScale
    sku_tier: ErGwScale
    tags:
      environment: production
      managed_by: acme

# ==============================================================================
# Virtual Network Gateway Connection  (ExpressRoute Connection - FastPath)
# Connects ER GW to Express Route Circuit via Azure Private Peering
# ==============================================================================
azure_virtual_network_gateway_connections:
  er-connection-israelcentral:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    connection_name: cn-acme-er-fastpath-israelcentral
    location: israelcentral
    connection_type: ExpressRoute
    virtual_network_gateway1_id: ref:azure_virtual_network_gateways.ergw-israelcentral.id
    peer_id: ref:azure_express_route_circuits.erc-israelcentral.id
    express_route_gateway_bypass: true
    enable_private_link_fast_path: true
    tags:
      environment: production
      managed_by: acme

# ==============================================================================
# Storage Account  (Staging - Israel Central)
# ==============================================================================
azure_storage_accounts:
  staging:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    account_name: stacmestaging
    sku_name: Standard_LRS
    kind: StorageV2
    location: israelcentral
    https_traffic_only_enabled: true
    minimum_tls_version: "TLS1_2"
    allow_blob_public_access: false
    public_network_access: Disabled
    tags:
      environment: production
      managed_by: acme
      purpose: staging

# ==============================================================================
# Private Endpoints  (3x - one per Israel Central VNet → staging storage blob)
# ==============================================================================
azure_private_endpoints:
  pe-vnet1-staging:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    private_endpoint_name: pe-acme-vnet1-staging
    location: israelcentral
    subnet_id: ref:azure_virtual_networks.vnet-pe1-israelcentral.subnet_ids.snet-private-endpoints
    private_link_service_connections:
      - name: plsc-staging
        private_link_service_id: ref:azure_storage_accounts.staging.id
        group_ids:
          - blob
    tags:
      environment: production
      managed_by: acme

  pe-vnet-ergw-staging:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    private_endpoint_name: pe-acme-vnet-ergw-staging
    location: israelcentral
    subnet_id: ref:azure_virtual_networks.vnet-ergw-israelcentral.subnet_ids.snet-private-endpoints
    private_link_service_connections:
      - name: plsc-staging
        private_link_service_id: ref:azure_storage_accounts.staging.id
        group_ids:
          - blob
    tags:
      environment: production
      managed_by: acme

  pe-vnet2-staging:
    resource_group_name: ref:azure_resource_groups.networking-israelcentral.resource_group_name
    private_endpoint_name: pe-acme-vnet2-staging
    location: israelcentral
    subnet_id: ref:azure_virtual_networks.vnet-pe2-israelcentral.subnet_ids.snet-private-endpoints
    private_link_service_connections:
      - name: plsc-staging
        private_link_service_id: ref:azure_storage_accounts.staging.id
        group_ids:
          - blob
    tags:
      environment: production
      managed_by: acme
